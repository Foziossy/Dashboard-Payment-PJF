<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Tiket · Prambanan Jazz 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0D0F0E;
      --surface:   #161918;
      --surface2:  #1E2220;
      --border:    #2A2F2C;
      --gold:      #C9A84C;
      --gold-dim:  #7A5E24;
      --green:     #4CAF72;
      --green-dim: rgba(76,175,114,0.15);
      --amber:     #E09A35;
      --amber-dim: rgba(224,154,53,0.15);
      --red:       #E05555;
      --red-dim:   rgba(224,85,85,0.13);
      --text:      #EEF0EE;
      --text-2:    #8A9490;
      --text-3:    #4A5450;
      --font-sans: 'Space Grotesk', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 22px;
      max-width: 640px;
      margin: 0 auto;
    }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    header h1 {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 700;
      line-height: 1.15;
    }
    header h1 span { color: var(--gold); }
    .header-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-2);
    }

    /* ── STATUS BAR ── */
    .status-bar {
      max-width: 640px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .status-dot.error { background: var(--red); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      flex: 1;
    }
    .status-text strong { color: var(--text-2); }

    /* ── SUMMARY ── */
    .summary {
      max-width: 640px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 12px;
    }
    .stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }

    /* ── CARDS ── */
    .cards {
      max-width: 640px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px 16px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold-dim);
    }
    .card.lunas::before { background: var(--green); }
    .card.warn::before  { background: var(--red); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .card-name {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
    }
    .card-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
    }
    .badge {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge-lunas { background: var(--green-dim); color: var(--green); }
    .badge-dp    { background: var(--amber-dim); color: var(--amber); }
    .badge-warn  { background: var(--red-dim);   color: var(--red); }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 12px; }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .pct-paid {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-2);
    }
    .pct-paid strong {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-right: 1px;
    }
    .pct-sisa {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-3);
    }
    .pct-sisa span { color: var(--amber); font-weight: 500; }
    .progress-track {
      background: var(--surface2);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.9s cubic-bezier(0.16,1,0.3,1);
    }

    /* ── LOADING / ERROR STATE ── */
    .state-box {
      max-width: 640px;
      margin: 40px auto;
      padding: 0 24px;
      text-align: center;
    }
    .state-box p {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-3);
      margin-top: 10px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      max-width: 640px;
      margin: 36px auto 0;
      padding: 0 24px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      text-align: center;
      line-height: 1.9;
    }

    @media (max-width: 420px) {
      header, .summary, .cards, .status-bar, footer { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Prambanan Jazz Festival 2025</p>
  <h1>Status <span>Pembayaran</span> Tiket</h1>
  <p class="header-sub">Data diperbarui otomatis dari spreadsheet.</p>
</header>

<div class="status-bar">
  <div class="status-dot" id="dot"></div>
  <p class="status-text" id="status-text">Menghubungkan…</p>
</div>

<div class="summary" id="summary"></div>
<div id="main"></div>

<footer>
  <p>Hubungi kami jika ada pertanyaan soal pembayaran tiket.</p>
  <p>Prambanan Jazz 2025 · Data live dari Google Sheets</p>
</footer>

<script>
  // ── GANTI URL INI dengan Web App URL dari Apps Script ──
  const API_URL = "https://script.google.com/macros/s/AKfycbybYTDL0ul0xJ5uHZWFQza0NxyTC-Z1OscDOACSfcUpwc_YMTGE50gNarRP3hmjO7qi/exec";

  const REFRESH_MS = 30000; // auto-refresh tiap 30 detik

  let lastUpdated = null;

  function pctColor(p) {
    if (p >= 100) return "var(--green)";
    if (p >= 50)  return "var(--amber)";
    return "var(--red)";
  }
  function badgeClass(p) {
    if (p >= 100) return "badge-lunas";
    if (p >= 50)  return "badge-dp";
    return "badge-warn";
  }
  function badgeLabel(p) {
    if (p >= 100) return "✓ Lunas";
    if (p >= 50)  return "DP";
    return "Belum lunas";
  }
  function cardClass(p) {
    if (p >= 100) return "lunas";
    if (p < 25)   return "warn";
    return "";
  }

  function renderSummary(data) {
    const lunas = data.filter(c => c.pct >= 100).length;
    const belum = data.filter(c => c.pct < 100).length;
    const totalTix = data.reduce((a, c) => a + c.tix, 0);
    document.getElementById("summary").innerHTML = `
      <div class="stat">
        <div class="stat-label">Total Tiket</div>
        <div class="stat-value">${totalTix}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sudah Lunas</div>
        <div class="stat-value green">${lunas}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Belum Lunas</div>
        <div class="stat-value amber">${belum}</div>
      </div>
    `;
  }

  function renderCards(data) {
    const html = data.map(c => {
      const sisa = 100 - c.pct;
      const color = pctColor(c.pct);
      return `
        <div class="card ${cardClass(c.pct)}">
          <div class="card-top">
            <div>
              <div class="card-name">${c.name}</div>
              <div class="card-meta">${c.tix} tiket</div>
            </div>
            <span class="badge ${badgeClass(c.pct)}">${badgeLabel(c.pct)}</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-labels">
              <span class="pct-paid"><strong>${c.pct}</strong>% terbayar</span>
              <span class="pct-sisa">${sisa > 0 ? `sisa <span>${sisa}%</span>` : 'lunas 🎉'}</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${c.pct}%; background:${color};"></div>
            </div>
          </div>
        </div>
      `;
    }).join("");

    document.getElementById("main").innerHTML = `<div class="cards">${html}</div>`;
  }

  function setStatus(state, msg) {
    const dot  = document.getElementById("dot");
    const text = document.getElementById("status-text");
    dot.className  = "status-dot " + (state === "live" ? "live" : state === "error" ? "error" : "");
    text.innerHTML = msg;
  }

  function showLoading() {
    document.getElementById("main").innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <p>Mengambil data…</p>
      </div>
    `;
  }

  async function fetchData() {
    try {
      const res  = await fetch(API_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();

      if (!json.ok || !json.data) throw new Error("Format data tidak valid");

      renderSummary(json.data);
      renderCards(json.data);

      const d = new Date(json.updated);
      const jam = d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      setStatus("live", `Live · diperbarui <strong>${jam}</strong>`);
      lastUpdated = json.updated;

    } catch (err) {
      setStatus("error", "Gagal memuat data — coba refresh");
      if (!lastUpdated) {
        document.getElementById("main").innerHTML = `
          <div class="state-box">
            <p>Tidak dapat terhubung ke spreadsheet.<br>Pastikan URL Apps Script sudah diatur.</p>
          </div>
        `;
      }
      console.error(err);
    }
  }

  // Init
  showLoading();
  fetchData();
  setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
